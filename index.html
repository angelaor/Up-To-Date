<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Venezuela — Daily Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#faf8f3; --ink:#16243f; --ink-soft:#33405a; --meta:#5c6470;
    --line:#e4ded1; --gold:#a87b1f;
    --concern:#9b2c2c; --concern-bg:#f6e9e6;
    --progress:#2c6e54; --progress-bg:#e7f0eb;
    --develop:#8a5a00; --develop-bg:#f6eed8;
    --card:#fffefb; --fs:17px; --maxw:760px;
  }
  *{box-sizing:border-box}
  html{font-size:var(--fs);-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;line-height:1.55;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 1.1rem 4rem}

  .toolbar{position:sticky;top:0;z-index:5;background:rgba(250,248,243,.94);
    backdrop-filter:saturate(140%) blur(6px);border-bottom:1px solid var(--line);}
  .toolbar-inner{max-width:var(--maxw);margin:0 auto;padding:.55rem 1.1rem;
    display:flex;flex-wrap:wrap;gap:.6rem;align-items:center;justify-content:space-between;}
  .controls{display:flex;flex-wrap:wrap;gap:.6rem .9rem;align-items:center}
  .sizes{display:flex;align-items:center;gap:.35rem}
  .sizes .lbl{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--meta);margin-right:.15rem}
  .size-btn{min-width:44px;min-height:40px;padding:0 .55rem;border:1px solid var(--line);
    background:var(--card);color:var(--ink);border-radius:8px;cursor:pointer;font-family:inherit;line-height:1;
    display:inline-flex;align-items:center;justify-content:center;}
  .size-btn[aria-pressed="true"]{border-color:var(--ink);background:var(--ink);color:#fff}
  .size-btn.s1{font-size:.82rem} .size-btn.s2{font-size:1rem} .size-btn.s3{font-size:1.18rem}
  .lang-btn{min-height:40px;padding:0 .75rem;border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;font-size:.85rem;
    display:inline-flex;align-items:center;gap:.4rem}
  .lang-btn:hover{border-color:var(--ink)}
  .lang-btn .globe{font-size:.95rem}
  .update-btn{min-height:40px;padding:0 .9rem;border:1px solid var(--gold);background:var(--gold);color:#fff;
    border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;font-size:.9rem;
    display:inline-flex;align-items:center;gap:.45rem;}
  .update-btn:disabled{opacity:.6;cursor:progress}
  .update-btn .dot{width:.5rem;height:.5rem;border-radius:50%;background:#fff;display:inline-block}
  .update-btn.loading .dot{animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

  header.mast{padding:2.2rem 0 1.1rem;border-bottom:2px solid var(--ink)}
  .eyebrow{font-size:.74rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:600}
  h1{font-family:"Source Serif 4",Georgia,"Times New Roman",serif;font-weight:700;font-size:2.5rem;
    line-height:1.04;margin:.35rem 0 .5rem;letter-spacing:-.01em;}
  .standfirst{color:var(--ink-soft);font-size:1.02rem;max-width:48ch;margin:0}
  .updated{margin-top:.7rem;font-size:.8rem;color:var(--meta)}
  .updated b{color:var(--ink-soft);font-weight:600}

  .urgent{margin:1.4rem 0 0;border-left:4px solid var(--concern);background:var(--concern-bg);
    border-radius:0 10px 10px 0;padding:1rem 1.1rem;}
  .urgent .kicker{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--concern);font-weight:600}
  .urgent h2{font-family:"Source Serif 4",Georgia,serif;font-size:1.32rem;margin:.25rem 0 .4rem;line-height:1.15}
  .urgent p{margin:0;color:var(--ink-soft);font-size:.98rem}
  .urgent .src{margin-top:.55rem;font-size:.78rem;color:var(--meta)}

  .sec{margin-top:2.4rem}
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:1rem;
    border-bottom:1px solid var(--line);padding-bottom:.45rem}
  .sec-head h2{font-family:"Source Serif 4",Georgia,serif;font-size:1.45rem;margin:0;font-weight:700}
  .sec-head .note{font-size:.78rem;color:var(--meta);text-align:right}

  .cards{display:grid;grid-template-columns:1fr;gap:.8rem;margin-top:1rem}
  @media(min-width:560px){.cards{grid-template-columns:1fr 1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:1rem 1.05rem}
  .card h3{margin:.15rem 0 .4rem;font-size:1.06rem;font-weight:600;line-height:1.25}
  .card p{margin:0;color:var(--ink-soft);font-size:.92rem}
  .card .src{margin-top:.6rem;font-size:.76rem;color:var(--meta)}

  .tag{display:inline-block;font-size:.68rem;letter-spacing:.07em;text-transform:uppercase;font-weight:600;
    padding:.18rem .5rem;border-radius:999px;line-height:1}
  .tag.progress{color:var(--progress);background:var(--progress-bg)}
  .tag.concern{color:var(--concern);background:var(--concern-bg)}
  .tag.developing{color:var(--develop);background:var(--develop-bg)}

  .feed{margin-top:1rem;display:flex;flex-direction:column;gap:.65rem}
  .item{display:flex;gap:.8rem;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:.85rem .95rem}
  .item .body{flex:1;min-width:0}
  .item h4{margin:.1rem 0 .3rem;font-size:1rem;font-weight:600;line-height:1.25}
  .item p{margin:0;color:var(--ink-soft);font-size:.9rem}
  .item .src{margin-top:.45rem;font-size:.75rem;color:var(--meta)}

  .status{margin-top:1rem;font-size:.82rem;color:var(--meta);min-height:1.2rem}
  .status.err{color:var(--concern)}

  .archive{margin-top:2.4rem;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:1.1rem}
  .archive h2{font-family:"Source Serif 4",Georgia,serif;font-size:1.3rem;margin:0 0 .25rem}
  .archive .lede{margin:0 0 .85rem;color:var(--ink-soft);font-size:.92rem}
  .archive .row{display:flex;flex-wrap:wrap;gap:.65rem;align-items:flex-end}
  .archive label{display:flex;flex-direction:column;gap:.28rem;font-size:.72rem;letter-spacing:.06em;
    text-transform:uppercase;color:var(--meta)}
  .archive input[type=date]{font-family:inherit;font-size:1rem;padding:.55rem .6rem;border:1px solid var(--line);
    border-radius:8px;background:var(--paper);color:var(--ink);min-height:44px}
  .archive .go{min-height:44px;padding:0 1.1rem;border:1px solid var(--ink);background:var(--ink);color:#fff;
    border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;font-size:.92rem}
  .archive .results{margin-top:1rem}
  .archive .hint{font-size:.88rem;color:var(--ink-soft);margin:0 0 .6rem}
  .archive .hint b{color:var(--ink)}
  .archive .links{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:.5rem}
  .archive .links a{display:flex;justify-content:space-between;gap:.8rem;align-items:center;text-decoration:none;
    color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:.7rem .85rem;
    font-size:.92rem;font-weight:500}
  .archive .links a:hover{border-color:var(--gold)}
  .archive .links a .arr{color:var(--gold);font-weight:600;white-space:nowrap}
  .archive .msg{font-size:.86rem;color:var(--concern);margin:.7rem 0 0}

  footer{margin-top:2.6rem;border-top:1px solid var(--line);padding-top:1.1rem;font-size:.82rem;color:var(--meta)}
  footer p{margin:.45rem 0}
  footer b{color:var(--ink-soft)}

  a{color:var(--gold)}
  :focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:6px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="controls">
      <div class="sizes" role="group" aria-label="Text size">
        <span class="lbl" id="t-sizeLabel">Text size</span>
        <button class="size-btn s1" data-size="15px" aria-pressed="false">A</button>
        <button class="size-btn s2" data-size="17px" aria-pressed="true">A</button>
        <button class="size-btn s3" data-size="20px" aria-pressed="false">A</button>
      </div>
      <button id="langBtn" class="lang-btn"><span class="globe" aria-hidden="true">&#127760;</span><span id="langLabel">Español</span></button>
    </div>
    <button id="updateBtn" class="update-btn">
      <span class="dot" aria-hidden="true"></span><span id="updateLabel">Update</span>
    </button>
  </div>
</div>

<div class="wrap">
  <header class="mast">
    <div class="eyebrow" id="t-eyebrow"></div>
    <h1 id="t-h1"></h1>
    <p class="standfirst" id="t-standfirst"></p>
    <p class="updated" id="t-updated"></p>
  </header>

  <section id="urgentWrap" class="urgent" aria-labelledby="urgentTitle"></section>

  <section class="sec" aria-labelledby="issuesHead">
    <div class="sec-head">
      <h2 id="issuesHead"></h2>
      <span class="note" id="t-issuesNote"></span>
    </div>
    <div id="issues" class="cards"></div>
  </section>

  <section class="sec" aria-labelledby="devHead">
    <div class="sec-head">
      <h2 id="devHead"></h2>
      <span class="note" id="t-devNote"></span>
    </div>
    <div id="developments" class="feed"></div>
  </section>

  <p id="status" class="status" role="status" aria-live="polite"></p>

  <section class="archive" aria-labelledby="archHead">
    <h2 id="archHead"></h2>
    <p class="lede" id="t-archLede"></p>
    <div class="row">
      <label><span id="t-archLabel"></span>
        <input type="date" id="archDate">
      </label>
      <button class="go" id="archGo"></button>
    </div>
    <div id="archResults" class="results" aria-live="polite"></div>
  </section>

  <footer id="t-footer"></footer>
</div>

  document.getElementById("t-archLabel").textContent = t.archLabel;
  document.getElementById("archGo").textContent = t.archFind;
  document.getElementById("t-footer").innerHTML = t.footer;
}

function render(){
  const t = T[LANG], data = content();
  document.getElementById("t-updated").innerHTML =
    esc(t.updatedPre)+"<b>"+esc(data.updatedAt)+"</b>"+esc(t.updatedPost);

  const u = data.urgent || {};
  document.getElementById("urgentWrap").innerHTML =
    '<div class="kicker">'+esc(t.urgentKicker)+'</div>'+
    '<h2 id="urgentTitle">'+esc(u.title)+'</h2>'+
    '<p>'+esc(u.summary)+'</p>'+
    (u.source?'<p class="src">'+esc(u.source)+'</p>':'');

  document.getElementById("issues").innerHTML = (data.issues||[]).map(function(it){
    var c = tagClass(it.tag);
    return '<article class="card"><span class="tag '+c+'">'+esc(t.tags[c])+'</span>'+
      '<h3>'+esc(it.title)+'</h3><p>'+esc(it.summary)+'</p>'+
      (it.source?'<p class="src">'+esc(it.source)+'</p>':'')+'</article>';
  }).join("");

  document.getElementById("developments").innerHTML = (data.developments||[]).map(function(it){
    var c = tagClass(it.tag);
    return '<div class="item"><div class="body"><span class="tag '+c+'">'+esc(t.tags[c])+'</span>'+
      '<h4>'+esc(it.title)+'</h4><p>'+esc(it.summary)+'</p>'+
      (it.source?'<p class="src">'+esc(it.source)+'</p>':'')+'</div></div>';
  }).join("");
}

function renderAll(){ applyStatic(); render(); if(document.getElementById("archResults").innerHTML.trim()) buildArchive(); }

document.getElementById("langBtn").addEventListener("click", function(){

/* ---------- live fetch (the "Claude loop") ---------- */
function sysPrompt(){
  const langLine = (LANG==="es")
    ? "Write every title, summary, and the updatedAt date in Spanish (updatedAt like '26 de junio de 2026')."
    : "Write every title, summary, and the updatedAt date in English (updatedAt like 'June 26, 2026').";
  return "You are a neutral news aggregator. Use web search to gather the most current, important news about Venezuela today. "+
    "Write every summary in your own words in 30 words or fewer; never quote sources; attribute to the news outlet's name. "+
    "Stay strictly neutral on political matters and attribute any characterization to the outlet that made it. "+
    "Tag each issue and development as one of: progress, concern, developing \u2014 judged only by impact on people's safety, "+
    "rights, and wellbeing, not political preference. Keep each 'tag' value in English exactly as progress, concern, or developing. "+
    langLine+" Respond with ONLY a valid JSON object, no markdown fences and no extra text, matching exactly: "+
    '{"updatedAt":"","urgent":{"title":"","summary":"","source":""},'+
    '"issues":[{"title":"","summary":"","tag":"","source":""}],'+
    '"developments":[{"title":"","summary":"","tag":"","source":""}]}. '+
    "Include 1 urgent item, 5 to 6 issues, and 6 developments.";
}

async function fetchLatest(){
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:API_MODEL, max_tokens:1000, system:sysPrompt(),
      messages:[{role:"user",content:(LANG==="es"?"Dame el resumen de Venezuela de hoy en JSON.":"Give me today's Venezuela brief as JSON.")}],
      tools:[{type:"web_search_20250305",name:"web_search"}]
    })
  });
  if(!res.ok) throw new Error("Request failed ("+res.status+")");
  const data = await res.json();
  const text = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
  const clean = text.replace(/```json|```/g,"").trim();
  const s = clean.indexOf("{"), e = clean.lastIndexOf("}");
  if(s<0||e<0) throw new Error("No JSON in response");
  return JSON.parse(clean.slice(s,e+1));
}

const btn = document.getElementById("updateBtn");
const updateLabel = document.getElementById("updateLabel");
const status = document.getElementById("status");

async function update(){
  const lang = LANG;
  btn.disabled = true; btn.classList.add("loading");
  updateLabel.textContent = T[lang].updating;
  status.className = "status"; status.textContent = T[lang].statusSearching;
  try{
    const fresh = await fetchLatest();
    liveData[lang] = fresh;
    if(LANG === lang){ render(); status.textContent = T[lang].statusUpdated; }
  }catch(err){
    status.className = "status err"; status.textContent = T[LANG].statusError;
  }finally{
    btn.disabled = false; btn.classList.remove("loading");
    updateLabel.textContent = T[LANG].update;
  }
}
btn.addEventListener("click", update);

/* ---------- archive: date -> links to that week's news ---------- */
const archDate = document.getElementById("archDate");
const archGo = document.getElementById("archGo");
const archResults = document.getElementById("archResults");

(function(){ const today = new Date().toISOString().slice(0,10); archDate.max = today; archDate.value = today; })();

function isoDay(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function humanDay(d){ return d.toLocaleDateString(LANG==="es"?"es-ES":"en-US",{month:"long",day:"numeric",year:"numeric"}); }

function buildArchive(){
  const t = T[LANG];
  archResults.innerHTML = "";
  const val = archDate.value;
  if(!val){ archResults.innerHTML = '<p class="msg">'+esc(t.archNoDate)+'</p>'; return; }
  const end = new Date(val+"T00:00:00");
  const today = new Date(); today.setHours(0,0,0,0);
  if(end > today){ archResults.innerHTML = '<p class="msg">'+esc(t.archFuture)+'</p>'; return; }
  const start = new Date(end); start.setDate(end.getDate()-6);
  const range = "%20after:"+isoDay(start)+"%20before:"+isoDay(new Date(end.getTime()+86400000));
  const base = "https://news.google.com/search?q=Venezuela";
  const links = [
    {label:t.archAll, url:base+range},
    {label:"Reuters", url:base+"%20site:reuters.com"+range},
    {label:"Al Jazeera", url:base+"%20site:aljazeera.com"+range},
    {label:"CNN", url:base+"%20site:cnn.com"+range}
  ];
  let html = '<p class="hint">'+t.archHint(humanDay(start),humanDay(end))+'</p><ul class="links">';
  links.forEach(function(l){
    html += '<li><a href="'+l.url+'" target="_blank" rel="noopener noreferrer">'+esc(l.label)+'<span class="arr">'+esc(t.archRead)+'</span></a></li>';
  });
  html += '</ul>';
  archResults.innerHTML = html;
}
archGo.addEventListener("click", buildArchive);
archDate.addEventListener("keydown", function(e){ if(e.key==="Enter"){ e.preventDefault(); buildArchive(); } });

/* ---------- boot ---------- */
renderAll();
update();
</script>
